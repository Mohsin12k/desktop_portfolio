<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="components/style.css">
    <script defer src="components/main.js"></script>
    <script defer src="https://kit.fontawesome.com/36314ca1f4.js" crossorigin="anonymous"></script>
</head>
<body>
    <main>
        <!-- section 1 -->
        <section class="main-section">
            <section id="sec-art-1">
                <article class="sec-1-img">
                    <img src="components/images/Mohsinpic.jpg" alt="Mohsin image">
                </article>
                <article class="sec-1-text">
                    <h1>Mohsin Khan</h1>
                    <p>Frontend Developer</p>
                    <button type="button" class="callBtn">Hire</button>
                    <button type="button" class="callBtn callBtn2">Message</button>
                </article>
                <button class="arrow"><p class="rotateArrow">></p></button>
            </section>
            <!-- section 2 -->
            <section id="sec-art-2" class="section2">
                <h2>Profile Details</h2>
                <article class="sec-2-text">
                    <p>I am Frontend Developer.I learn Html, CSS, Javascript, TailwindCSS
                        and React.js.I have 2 years of experience in Frontend Development.
                    </p>
                </article>

                <article class="sec-2-skills">
                    <h3>Skills</h3>

                    <div class="html-skill">
                        <div class="html-icon">
                            <i class="fa-brands fa-html5"></i>
                            <p class="html">HTML</p>
                        </div>
                        <div class="html-percentage">
                            <div class="htmlPer">95%</div>
                        </div>
                    </div>
                    <!-- css skills -->
                    <div class="css-skill">
                        <div class="css-icon">
                            <i class="fa-brands fa-css3-alt"></i>
                            <p class="css">css</p>
                        </div>                        
                        <div class="css-percentage">
                            <div class="cssPer">85%</div>
                        </div>
                    </div>
                    <!-- js skills -->
                    <div class="js-skill">
                        <div class="js-icon">
                            <i class="fa-brands fa-js"></i>
                            <p class="js">Javascript</p>
                        </div>
                        <div class="js-percentage">
                            <div class="jsPer">75%</div>
                        </div>
                    </div>     
                      <!-- tailwindCss  -->
                    <div class="tailwind-skill">
                        <div class="tailwind-icon">
                            <i class="fa-brands fa-tailwind-css"></i>
                            <p class="tailwind">TailwindCSS</p>
                        </div>
                        <div class="tailwind-percentage">
                            <div class="tailwindPer">95%</div>
                        </div>
                    </div> 
                     <!-- React.js  -->
                    <div class="react-skill">
                        <div class="react-icon">
                            <i class="fa-brands fa-react"></i>
                            <p class="react">React</p>
                        </div>
                        <div class="react-percentage">
                            <div class="reactPer">60%</div>
                        </div>
                    </div>                
        
                </article>
        
                <article class="social-media">
                    <span class="social-links">
                        <i class="fa-brands fa-linkedin"></i>
                        <i class="fa-brands fa-twitter"></i>
                        <i class="fa-brands fa-facebook"></i>
                        <i class="fa-brands fa-instagram"></i>
                    </span>
                </article>
            </section>
        </section>
    </main>
</body>
</html>
